name: daily-update

on:
  schedule:
    # 平日 17:30 台北 = 09:30 UTC（TWSE 收盤資料已齊）
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # reseed（cache miss）約需 ~13 分，多留緩衝
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # 滾動 OHLC 視窗跨日保存（不進 git；~7MB gzip）。restore-keys 前綴匹配 → 取回最近一份。
      - name: Restore OHLC window cache
        uses: actions/cache/restore@v4
        with:
          path: data/ohlc_window.json.gz
          key: ohlc-window-${{ github.run_id }}
          restore-keys: |
            ohlc-window-

      # cache miss（首次 / 逾 7 天未存被逐出）→ 自動按日 reseed 重建
      - name: Seed OHLC window if missing
        run: |
          if [ ! -f data/ohlc_window.json.gz ]; then
            echo "無視窗快取 → 按日 reseed（~13分）"
            python scripts/build_ohlc_window.py --seed
          fi

      - name: Run pipeline
        run: python scripts/run_all.py

      # 存回今日更新後的視窗（每次 run 唯一 key，滾動前進）
      - name: Save OHLC window cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/ohlc_window.json.gz
          key: ohlc-window-${{ github.run_id }}

      - name: Commit data + docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto: daily update $(date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi
