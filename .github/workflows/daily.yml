name: daily-update

on:
  schedule:
    # 平日 17:30 台北 = 09:30 UTC（TWSE 收盤資料已齊）
    # ⚠️ 實測（2026-07-07~16 共 8 次）：GitHub Actions 免費排程會排隊，平均遲到 134 分、
    #    最多 169 分 → 實際觸發落在台北 19:00–20:20。這是平台行為、非設定錯，無法靠提前
    #    cron 解決（提前只會讓資料還沒齊）。對外說明一律寫「收盤後」而非「17:30」。
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write        # 失敗時開 Issue 通知（GitHub 會自動寄信/手機推播，零 secrets）

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # 滾動 OHLC 視窗跨日保存（每日版不進 git；~7MB gzip）。restore-keys 前綴匹配 → 取回最近一份。
      - name: Restore OHLC window cache
        uses: actions/cache/restore@v4
        with:
          path: data/ohlc_window.json.gz
          key: ohlc-window-${{ github.run_id }}
          restore-keys: |
            ohlc-window-

      # cache miss（首次 / 逾 7 天未存被逐出）→ 由 repo 內 archive（data/history_ohlc/）秒重建。
      # archive 是永久正本、每日 append-only 累積，永遠比舊的種子基準檔新。
      # 不在 Actions reseed：資料中心 IP 會被 TWSE/TPEx 限速，逐日抓會 timeout。
      - name: Rebuild OHLC window from archive if cache missing
        run: |
          if [ ! -f data/ohlc_window.json.gz ]; then
            echo "無視窗快取 → 由 archive 重建"
            python scripts/build_ohlc_window.py --from-archive
          fi

      # run_all 設計為「單一模組失敗不擋全局」（只有 render 掛才回非 0）→ 綠燈也可能有模組沒抓到，
      # 那天的 archive 就缺一角且靜默。故這裡另外攔 run_all 印的失敗清單，交給下面開 Issue。
      - name: Run pipeline
        id: pipeline
        run: |
          set -o pipefail
          python scripts/run_all.py 2>&1 | tee /tmp/pipeline.log
        continue-on-error: true

      - name: Detect partial failures / data gaps
        id: check
        if: always()
        run: |
          PARTIAL=""
          if grep -q "完成但有失敗模組" /tmp/pipeline.log 2>/dev/null; then
            PARTIAL=$(grep "完成但有失敗模組" /tmp/pipeline.log | head -1)
          fi
          # archive 今日快照沒產出 = 永久缺一天（累積型資料最怕靜默缺口）
          GAP=""
          TODAY_SNAP=$(ls -t data/history_ohlc/*.json 2>/dev/null | head -1)
          echo "最新 archive 快照：${TODAY_SNAP:-無}"
          if [ -z "$TODAY_SNAP" ]; then GAP="archive 無任何快照"; fi
          {
            echo "partial=$PARTIAL"
            echo "gap=$GAP"
            echo "pipeline_outcome=${{ steps.pipeline.outcome }}"
          } >> "$GITHUB_OUTPUT"

      # 整體失敗 or 部分模組失敗 or archive 缺口 → 開 Issue（GitHub 自動寄信通知）
      - name: Notify on failure
        if: always() && (steps.pipeline.outcome == 'failure' || steps.check.outputs.partial != '' || steps.check.outputs.gap != '')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="❌ daily-update 異常 $(date -u +'%Y-%m-%d')"
          BODY=$(cat <<EOF
          每日資料管線有異常，**累積型資料可能缺一天（缺口永久）**，請確認是否需要補跑。

          - pipeline 結果：\`${{ steps.pipeline.outcome }}\`
          - 部分模組失敗：\`${{ steps.check.outputs.partial }}\`
          - archive 缺口：\`${{ steps.check.outputs.gap }}\`
          - Run: $RUN_URL

          補跑方式：Actions → daily-update → Run workflow（同日重跑會覆蓋當日快照）。

          <details><summary>pipeline log 尾段</summary>

          \`\`\`
          $(tail -30 /tmp/pipeline.log 2>/dev/null || echo "無 log")
          \`\`\`
          </details>
          EOF
          )
          gh issue create --title "$TITLE" --body "$BODY" --label "" || \
            gh issue create --title "$TITLE" --body "$BODY"


      # 存回今日更新後的視窗（每次 run 唯一 key，滾動前進）
      - name: Save OHLC window cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/ohlc_window.json.gz
          key: ohlc-window-${{ github.run_id }}

      # always()：即使 pipeline 有模組失敗也要 commit ——「今日 archive 快照」只存在 runner 上，
      # 不 commit 就永久缺這天（累積型資料最怕的洞）。工作區乾淨的資料先落地，紅燈留到最後報。
      - name: Commit data + docs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "auto: daily update $(date +'%Y-%m-%d %H:%M %Z')"
          # 本 run 期間若有人 push（2026-07-16 撞過：排程跑到一半被手動 push 插隊）→
          # push 會 rejected。rebase 後重試；生成檔衝突取本次算好的版本（-X theirs）。
          for i in 1 2 3; do
            if git push; then
              echo "pushed (attempt $i)"
              exit 0
            fi
            echo "push rejected → rebase 後重試 ($i/3)"
            git pull --rebase -X theirs origin main || git rebase --abort || true
          done
          echo "::error::push 連續 3 次失敗"
          exit 1

      # 資料已落地後才報紅燈（render 掛＝沒頁面，workflow 必須顯示失敗）
      - name: Fail job if pipeline failed
        if: always() && steps.pipeline.outcome == 'failure'
        run: |
          echo "::error::run_all.py 失敗（見上方 log 與已開的 Issue）"
          exit 1
