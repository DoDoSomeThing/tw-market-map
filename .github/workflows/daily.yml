name: daily-update

on:
  schedule:
    # 平日 17:30 台北 = 09:30 UTC（TWSE 收盤資料已齊）
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/run_all.py

      - name: Commit data + docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto: daily update $(date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi
